spring.application.name=api
# Porta do Servidor (Certifique-se de que o docker-compose aponta para 8081 se mudar aqui)
server.port=8081

# --- Configuracao IA (Ollama) ---
# Usamos o nome do servico 'ollama' definido no docker-compose
spring.ai.ollama.base-url=http://localhost:11434

# IMPORTANTE: Alterado para o modelo leve que cabe na sua MX450 (2GB VRAM)
spring.ai.ollama.chat.options.model=llama3:8b-instruct-q2_K

# --- Configuracao Banco (PostgreSQL) ---
# O host deve ser 'postgres-db' (nome do servico no docker-compose)
spring.datasource.url=jdbc:postgresql://postgres-db:5432/neuraldb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- Observabilidade e Performance ---
# Ativa Virtual Threads (Java 21) para nao travar o /healthz durante o Ollama
spring.threads.virtual.enabled=true

# Ativa Probes de Liveness e Readiness nativos (Spring Actuator)
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true






